<script>
const {useState, useRef, useCallback} = React;

const C = {
  bg:"#07090f",card:"#0d1117",border:"#1a2030",
  accent:"#3b82f6",green:"#22c55e",red:"#ef4444",amber:"#f59e0b",
  text:"#e2e8f0",muted:"#4b5563",dim:"#1e293b",surface:"#0a0f1a",
};

// ── CSVパーサー ──
function parseCSV(text) {
  const clean = text.replace(/^\uFEFF/,"").replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  const lines = clean.split("\n").map(l=>l.trim()).filter(Boolean);
  if(lines.length < 2) return [];

  let headerIdx = 0;
  for(let i=0;i<Math.min(5,lines.length);i++){
    const l = lines[i].toLowerCase();
    if(l.includes("コード")||l.includes("code")||l.includes("銘柄")||l.includes("ticker")){headerIdx=i;break;}
  }
  const headers = lines[headerIdx].split(",").map(h=>h.replace(/"/g,"").trim().toLowerCase());

  const idx = keys => {
    for(const k of keys){
      const i = headers.findIndex(h=>h.includes(k));
      if(i>=0) return i;
    }
    return -1;
  };

  const codeIdx     = idx(["コード","code","ticker","証券コード"]);
  const nameIdx     = idx(["銘柄名","name","銘柄","会社名"]);
  const priceIdx    = idx(["現在値","株価","終値","price","close","現値"]);
  const changeIdx   = idx(["前日比","変化率","騰落率","change","前日騰落"]);
  const rsiIdx      = idx(["rsi"]);
  const volIdx      = idx(["出来高","volume","vol"]);
  const ma25Idx     = idx(["25日","ma25","移動平均25"]);
  const volRatioIdx = idx(["6日/25日","出来高平均6","出来高倍率"]);

  const results = [];
  for(let i=headerIdx+1;i<lines.length;i++){
    const cols = lines[i].split(",").map(c=>c.replace(/"/g,"").trim());
    if(cols.length < 2) continue;
    const code  = codeIdx  >= 0 ? (cols[codeIdx]||"").replace(/\s/g,"") : "";
    const name  = nameIdx  >= 0 ? cols[nameIdx] : code||`銘柄${i}`;
    const price = priceIdx >= 0 ? parseFloat((cols[priceIdx]||"").replace(/[,￥¥]/g,"")) : NaN;
    let change = NaN;
    if(changeIdx >= 0){
      const raw = cols[changeIdx]||"";
      const m = raw.match(/\(([+-]?[\d.]+)%\)/);
      change = m ? parseFloat(m[1]) : parseFloat(raw.replace(/[%,]/g,""));
    }
    const rsi      = rsiIdx      >= 0 ? parseFloat(cols[rsiIdx])                             : NaN;
    const vol      = volIdx      >= 0 ? parseFloat((cols[volIdx]||"").replace(/,/g,""))      : NaN;
    const ma25     = ma25Idx     >= 0 ? parseFloat((cols[ma25Idx]||"").replace(/,/g,""))     : NaN;
    const volRatio = volRatioIdx >= 0 ? parseFloat((cols[volRatioIdx]||"").replace(/,/g,"")) : NaN;
    if(!code && isNaN(price)) continue;
    let ma25dev = NaN;
    if(!isNaN(ma25)&&!isNaN(price)&&ma25>0) ma25dev = ((price-ma25)/ma25)*100;
    results.push({code,name,price,change,rsi,vol,ma25dev,volRatio});
  }
  return results;
}

// ── スコアリング ──
function scoreRow(row){
  const {change,rsi,ma25dev,volRatio} = row;
  const s_trend = isNaN(ma25dev)?55:ma25dev>8?90:ma25dev>4?78:ma25dev>1?65:ma25dev>-1?52:ma25dev>-5?38:25;
  const s_rsi   = isNaN(rsi)?55:rsi>75?25:rsi>65?65:rsi>50?80:rsi>40?72:rsi>28?60:78;
  const s_mom   = isNaN(change)?55:change>4?88:change>2?74:change>0.5?62:change>-0.5?52:change>-2?38:24;
  const s_vol   = isNaN(volRatio)?55:volRatio>2?90:volRatio>1.5?75:volRatio>1.2?62:volRatio>1.0?52:volRatio>0.8?40:28;
  const w = [[s_trend,isNaN(ma25dev)?0:0.30],[s_rsi,isNaN(rsi)?0:0.25],[s_mom,isNaN(change)?0:0.25],[s_vol,isNaN(volRatio)?0:0.20]];
  const totalW = w.reduce((a,[,wt])=>a+wt,0);
  if(totalW===0) return 50;
  return Math.min(99,Math.max(1,Math.round(w.reduce((a,[v,wt])=>a+v*wt,0)/totalW)));
}

// ── コメント生成 ──
function buildComment(item, budget){
  const pri = item.score>=68?"高":item.score>=50?"中":"低";
  const reason = item.score>=68?"複数の指標が好転。優先的にチャートを確認":item.score>=50?"一部の指標に動きあり。余裕があれば確認を":"現時点では積極的に見る必要は低め";
  const pts = [];
  if(!isNaN(item.volRatio)&&item.volRatio>1.5) pts.push(`出来高倍率${item.volRatio}倍と増加。注目度が高まっている`);
  if(!isNaN(item.rsi)&&item.rsi>72) pts.push(`RSI ${item.rsi}：買われすぎ圏。反落に注意`);
  if(!isNaN(item.rsi)&&item.rsi<28) pts.push(`RSI ${item.rsi}：売られすぎ圏。反発の可能性`);
  if(!isNaN(item.ma25dev)&&item.ma25dev>6) pts.push(`25日MA乖離+${item.ma25dev.toFixed(1)}%：上昇トレンド継続中`);
  if(!isNaN(item.ma25dev)&&item.ma25dev<-6) pts.push(`25日MA乖離${item.ma25dev.toFixed(1)}%：下降圧力強め`);
  if(!isNaN(item.change)&&item.change>3) pts.push(`前日比+${item.change}%と大幅上昇。ブレイクか確認を`);
  if(!isNaN(item.change)&&item.change<-3) pts.push(`前日比${item.change}%と大幅下落。サポート確認を`);
  if(pts.length===0) pts.push("特段の異常値なし。現状トレンドの継続を確認");
  const summary = item.score>=75?"勢いあり。高値・節目をチャートで確認して。":item.score>=68?"複数サイン点灯。見逃さずに。":item.score>=55?"方向感が出てきた段階。もう少し様子見でも。":item.score>=45?"静観が無難。急変なければ次の機会を。":"現時点ではパス推奨。";

  // 資金シミュレーション
  let sim = "";
  if(!isNaN(item.price)&&item.price>0&&budget>0){
    const lotSize = 100;
    const normalLots = Math.floor(budget/(item.price*lotSize));
    const normalCost = normalLots*item.price*lotSize;
    const normalLeft = budget-normalCost;
    const sShares = Math.floor(budget/item.price);
    const sCost = Math.round(sShares*item.price);
    const sLeft = budget-sCost;
    sim = `\n④ 資金${(budget/10000).toFixed(0)}万円シミュレーション\n`
      +`   通常購入：${normalLots}単元(${normalLots*lotSize}株) ≒ ¥${normalCost.toLocaleString()} / 残 ¥${normalLeft.toLocaleString()}\n`
      +`   S株購入 ：${sShares}株 ≒ ¥${sCost.toLocaleString()} / 残 ¥${sLeft.toLocaleString()}`;
  }

  return `① 優先度：${pri}　${reason}\n② ${pts[0]}${pts[1]?"\n　　"+pts[1]:""}\n③ ${summary}${sim}`;
}

// ── プロンプト生成 ──
function buildPrompt(item, budget){
  const b = (budget/10000).toFixed(0);
  const lotSize = 100;
  const normalLots = !isNaN(item.price)&&item.price>0 ? Math.floor(budget/(item.price*lotSize)) : "?";
  const sShares    = !isNaN(item.price)&&item.price>0 ? Math.floor(budget/item.price) : "?";
  return `以下の条件でこのチャートを分析してください。

【銘柄】${item.name}（${item.code}）
【現在値】¥${!isNaN(item.price)?item.price.toLocaleString():"-"}
【資金】${b}万円（※余力を残すこと。1銘柄への投入は資金の30〜50%以内を目安に）
【購入方法】S株と通常購入の2パターンで検討
【戦略】スイングトレード（数日〜数週間保有を想定）

---

## 手順

### STEP1：まずエントリースコアを採点
以下の基準で100点満点で採点し「エントリースコア：XX点」と出力してください。

採点基準（スイング視点）：
- トレンドの強さ・方向性（25点）：数日〜数週間続く勢いがあるか
- エントリータイミングの良さ（25点）：今が絶好か、もう少し待つべきか
- リスクリワード比の優位性（25点）：損小利大になっているか
- チャート形状・パターンの信頼度（25点）：スイングで機能しやすい形か

### STEP2：スコアに応じて回答を変えてください

**スコア39点以下の場合（パス）**
以下だけ出力して終了してください：
エントリースコア：XX点
見送り理由：（1〜2行）

**スコア40〜59点の場合（様子見）**
以下だけ出力して終了してください：
エントリースコア：XX点
現状：（トレンドを1行）
様子見の理由：（1〜2行）
エントリーを検討できる条件：（1〜2行）

**スコア60点以上の場合（エントリー検討）**
以下をすべて出力してください：

① トレンド・チャート形状
- 現在のトレンドと注目すべき節目

② エントリー目安
- 通常購入（${normalLots}単元が上限）：エントリー価格と根拠
- S株購入（最大${sShares}株）：エントリー価格と根拠
- 理想のエントリータイミング・トリガー

③ 利確・損切りの目安
- 利確第1目標（数日）・第2目標（数週間）
- 損切りライン・想定リスクリワード比

④ 資金${b}万円シミュレーション（投入上限は資金の50%＝${Math.round(budget*0.5/10000)}万円を目安に）
- 通常購入 vs S株購入、それぞれ投入上限内で何株買えるか
- 残余力はいくらか
- どちらが適しているか

⑤ 【必須】最後に必ず以下のフォーマットをそのまま埋めて出力してください。省略・変形しないでください。

---
【${item.name}（${item.code}） エントリーメモ】
・エントリースコア：XX点
・買いの目安：¥XXXX（根拠：〇〇）
・理想のエントリータイミング：〇〇
・利確第1目標：¥XXXX（+X%、数日以内）
・利確第2目標：¥XXXX（+X%、数週間）
・損切りライン：¥XXXX（-X%）
・推奨：通常 X単元 or S株 X株
---

※上記メモの出力を省略しないこと。これが最終アウトプットです。
※投資判断の最終責任は自分にあります。参考情報として分析してください。`;
}

// ── UI部品 ──
function HeatBar({score}){
  const [a,b] = score>=68?["#22c55e","#16a34a"]:score>=50?["#f59e0b","#d97706"]:["#ef4444","#b91c1c"];
  return React.createElement("div",{style:{height:4,borderRadius:2,background:C.dim,overflow:"hidden"}},
    React.createElement("div",{style:{height:"100%",width:`${score}%`,background:`linear-gradient(90deg,${a},${b})`,transition:"width .5s"}})
  );
}

function Chip({label}){
  const m={注目:[C.green,"#052e16"],様子見:[C.amber,"#1c1200"],低優先:[C.red,"#1c0505"]};
  const [fg,bg]=m[label]||[C.muted,C.dim];
  return React.createElement("span",{style:{padding:"2px 9px",borderRadius:20,fontSize:11,fontWeight:700,color:fg,background:bg,border:`1px solid ${fg}33`}},label);
}

function Stat({label,value,color}){
  return React.createElement("div",{style:{flex:1,textAlign:"center"}},
    React.createElement("div",{style:{fontSize:10,color:C.muted,marginBottom:2,textTransform:"uppercase",letterSpacing:"0.05em"}},label),
    React.createElement("div",{style:{fontSize:13,fontWeight:700,color:color||C.text,fontVariantNumeric:"tabular-nums"}},value??"-")
  );
}

const GUIDES = [
  {name:"SBI証券",steps:["スクリーナー→「詳細検索」を開く","市場：東証プライム を選択","条件設定して「検索」","結果画面の「CSVダウンロード」をタップ"]},
  {name:"楽天証券",steps:["スーパースクリーナーを開く","市場：プライム を選択","条件追加して「スクリーニング」","「CSVダウンロード」をタップ"]},
  {name:"マネックス",steps:["銘柄スカウターを開く","スクリーニング条件を設定","「一覧表示」→「CSV出力」"]},
];

// ── メインアプリ ──
function App(){
  const [screen,setScreen]   = useState("home");
  const [items,setItems]     = useState([]);
  const [tab,setTab]         = useState("注目");
  const [expanded,setExpanded] = useState(null);
  const [comments,setComments] = useState({});
  const [copied,setCopied]   = useState(null);
  const [error,setError]     = useState("");
  const [fileName,setFileName] = useState("");
  const [guideIdx,setGuideIdx] = useState(0);
  const [budget,setBudget]   = useState(1000000);
  const fileRef = useRef(null);
  const textRef = useRef(null);

  const processCSV = (text, name="") => {
    setError("");
    const rows = parseCSV(text);
    if(rows.length===0){setError("CSVを読み取れませんでした。形式を確認してください。");return;}
    const scored = rows
      .map(r=>({...r,score:scoreRow(r)}))
      .map(r=>({...r,signal:r.score>=68?"注目":r.score>=50?"様子見":"低優先"}))
      .sort((a,b)=>b.score-a.score);
    setItems(scored);
    setFileName(name);
    setTab("注目");
    setExpanded(null);
    setComments({});
    setScreen("result");
  };

  const onFile = e => {
    const file = e.target.files?.[0];
    if(!file) return;
    // Shift-JIS → UTF-8 フォールバック付き
    const tryRead = (encoding) => new Promise((resolve,reject)=>{
      const r = new FileReader();
      r.onload = ev => resolve(ev.target.result);
      r.onerror = reject;
      r.readAsText(file, encoding);
    });
    tryRead("Shift-JIS").then(text=>{
      // 文字化けチェック：置換文字が多い場合はUTF-8で再試行
      if((text.match(/\uFFFD/g)||[]).length > 5){
        return tryRead("UTF-8");
      }
      return text;
    }).then(text => processCSV(text, file.name))
      .catch(()=>setError("ファイルの読み込みに失敗しました"));
    e.target.value="";
  };

  const onPaste = () => {
    const text = textRef.current?.value||"";
    if(!text.trim()){setError("テキストを貼り付けてください");return;}
    processCSV(text,"貼り付けデータ");
  };

  const toggle = item => {
    if(expanded===item.code){setExpanded(null);return;}
    setExpanded(item.code);
    setComments(prev=>prev[item.code]?prev:{...prev,[item.code]:buildComment(item,budget)});
  };

  const copyMemo = (item, e) => {
    e.stopPropagation();
    const b = Math.round(budget / 10000);
    const lotSize = 100;
    const half = budget * 0.5;
    const normalLots = !isNaN(item.price)&&item.price>0 ? Math.floor(half/(item.price*lotSize)) : "?";
    const sShares    = !isNaN(item.price)&&item.price>0 ? Math.floor(half/item.price) : "?";
    const text = `【${item.name}（${item.code}） エントリーメモ】
・エントリースコア：XX点
・買いの目安：¥XXXX（根拠：〇〇）
・理想のエントリータイミング：〇〇
・利確第1目標：¥XXXX（+X%、数日以内）
・利確第2目標：¥XXXX（+X%、数週間）
・損切りライン：¥XXXX（-X%）
・推奨：通常 ${normalLots}単元 or S株 ${sShares}株（資金50%上限）`;
    navigator.clipboard.writeText(text).catch(()=>{
      const ta = document.createElement("textarea");
      ta.value = text; document.body.appendChild(ta);
      ta.select(); document.execCommand("copy");
      document.body.removeChild(ta);
    }).finally ? navigator.clipboard.writeText(text).then(()=>{}).catch(()=>{}) : null;
    navigator.clipboard.writeText(text).then(()=>{
      setCopied(item.code+"_memo");
      setTimeout(()=>setCopied(null),2000);
    }).catch(()=>{
      const ta = document.createElement("textarea");
      ta.value = text; document.body.appendChild(ta);
      ta.select(); document.execCommand("copy");
      document.body.removeChild(ta);
      setCopied(item.code+"_memo");
      setTimeout(()=>setCopied(null),2000);
    });
  };

  const copyPrompt = (item, e) => {
    e.stopPropagation();
    const text = buildPrompt(item, budget);
    navigator.clipboard.writeText(text).then(()=>{
      setCopied(item.code+"_full");
      setTimeout(()=>setCopied(null),2000);
    }).catch(()=>{
      const ta = document.createElement("textarea");
      ta.value = text; document.body.appendChild(ta);
      ta.select(); document.execCommand("copy");
      document.body.removeChild(ta);
      setCopied(item.code+"_full");
      setTimeout(()=>setCopied(null),2000);
    });
  };

  const cnt = {注目:0,様子見:0,低優先:0};
  items.forEach(x=>{if(cnt[x.signal]!==undefined)cnt[x.signal]++;});
  const filtered = tab==="全銘柄"?items:items.filter(x=>x.signal===tab);
  const guide = GUIDES[guideIdx];

  const h = React.createElement;

  // ── ホーム ──
  if(screen==="home") return h("div",{style:{minHeight:"100dvh",background:C.bg,color:C.text,padding:"0 0 60px"}},
    h("div",{style:{padding:"28px 18px 0"}},

      h("div",{style:{fontSize:22,fontWeight:800,letterSpacing:"0.06em",color:"#fff",marginBottom:4}},"PRIME SCAN"),
      h("div",{style:{fontSize:13,color:C.muted,marginBottom:24}},"証券会社のCSVを読み込んでスクリーニング"),

      // 資金設定
      h("div",{style:{background:C.card,borderRadius:14,border:`1px solid ${C.border}`,padding:"16px 18px",marginBottom:14}},
        h("div",{style:{fontSize:13,fontWeight:700,color:"#fff",marginBottom:10}},"💰 運用資金"),
        h("div",{style:{display:"flex",alignItems:"center",gap:8}},
          h("input",{
            type:"number",value:budget/10000,
            onChange:e=>setBudget(Math.max(1,parseFloat(e.target.value)||0)*10000),
            style:{flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,
              color:C.text,fontSize:18,fontWeight:700,padding:"10px 12px",textAlign:"right"},
          }),
          h("span",{style:{fontSize:14,color:C.muted,flexShrink:0}},"万円")
        ),
        h("div",{style:{fontSize:11,color:C.muted,marginTop:6}},"プロンプト生成やシミュレーションに使用されます")
      ),

      // ファイル選択
      h("div",{style:{background:C.card,borderRadius:14,border:`1px solid ${C.border}`,padding:"20px 18px",marginBottom:14}},
        h("div",{style:{fontSize:13,fontWeight:700,color:"#fff",marginBottom:6}},"📂 CSVファイルを選択"),
        h("div",{style:{fontSize:12,color:C.muted,marginBottom:14}},"証券会社のスクリーナーからダウンロードしたCSVを読み込みます"),
        h("button",{onClick:()=>fileRef.current?.click(),style:{
          width:"100%",padding:"13px",borderRadius:10,background:C.accent,
          color:"#fff",border:"none",fontSize:15,fontWeight:700,
        }},"ファイルを選択"),
        h("input",{ref:fileRef,type:"file",accept:".csv,.txt",onChange:onFile,style:{display:"none"}})
      ),

      // テキスト貼り付け
      h("div",{style:{background:C.card,borderRadius:14,border:`1px solid ${C.border}`,padding:"20px 18px",marginBottom:14}},
        h("div",{style:{fontSize:13,fontWeight:700,color:"#fff",marginBottom:6}},"📋 CSVテキストを貼り付け"),
        h("div",{style:{fontSize:12,color:C.muted,marginBottom:10}},"CSVの内容をコピーしてここに貼り付け"),
        h("textarea",{ref:textRef,rows:5,placeholder:"コード,銘柄名,現在値,前日比...",style:{
          width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,
          color:C.text,fontSize:12,padding:"10px",resize:"vertical",boxSizing:"border-box",
        }}),
        error&&h("div",{style:{color:C.red,fontSize:12,marginTop:6}},error),
        h("button",{onClick:onPaste,style:{
          width:"100%",padding:"13px",borderRadius:10,marginTop:10,
          background:"#1e3a5f",color:C.accent,border:`1px solid ${C.accent}44`,
          fontSize:15,fontWeight:700,
        }},"読み込む")
      ),

      // ガイド
      h("div",{style:{background:C.card,borderRadius:14,border:`1px solid ${C.border}`,padding:"20px 18px"}},
        h("div",{style:{fontSize:13,fontWeight:700,color:"#fff",marginBottom:12}},"📖 CSV取得方法"),
        h("div",{style:{display:"flex",gap:6,marginBottom:14}},
          GUIDES.map((g,i)=>h("button",{key:g.name,onClick:()=>setGuideIdx(i),style:{
            flex:1,padding:"7px 4px",borderRadius:8,fontSize:12,fontWeight:600,
            background:guideIdx===i?"#0f2044":C.surface,
            color:guideIdx===i?C.accent:C.muted,
            border:`1px solid ${guideIdx===i?C.accent+"55":C.border}`,
          }},g.name))
        ),
        h("ol",{style:{margin:0,padding:"0 0 0 18px"}},
          guide.steps.map((s,i)=>h("li",{key:i,style:{fontSize:13,color:C.text,marginBottom:8,lineHeight:1.6}},s))
        ),
        h("div",{style:{marginTop:14,fontSize:12,color:C.muted,background:C.surface,borderRadius:8,padding:"10px 12px",lineHeight:1.7}},
          "💡 対応カラム：コード / 銘柄名 / 現在値 / 前日比 / RSI / 出来高 / 25日MA",h("br"),
          "※ カラム名が異なっても自動で判定します"
        )
      )
    )
  );

  // ── 結果画面 ──
  const TABS = ["注目","様子見","低優先","全銘柄"];
  return h("div",{style:{minHeight:"100dvh",background:C.bg,color:C.text}},

    // ヘッダー
    h("div",{style:{padding:"12px 14px 10px",position:"sticky",top:0,background:C.bg,zIndex:10,borderBottom:`1px solid ${C.border}`}},
      h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}},
        h("div",null,
          h("div",{style:{fontSize:15,fontWeight:800,letterSpacing:"0.07em",color:"#fff"}},"PRIME SCAN"),
          h("div",{style:{fontSize:10,color:C.muted,marginTop:1}},`${fileName} · ${items.length}銘柄 · 資金${(budget/10000).toFixed(0)}万円`)
        ),
        h("button",{onClick:()=>setScreen("home"),style:{
          padding:"7px 14px",borderRadius:8,border:`1px solid ${C.border}`,
          background:C.card,color:C.text,fontSize:13,fontWeight:600,
        }},"再読込")
      ),
      h("div",{style:{display:"flex",gap:4}},
        TABS.map(t=>{
          const n = t==="全銘柄"?items.length:(cnt[t]??0);
          const on = tab===t;
          return h("button",{key:t,onClick:()=>setTab(t),style:{
            flex:1,padding:"7px 4px",borderRadius:7,lineHeight:1.3,
            border:on?`1.5px solid ${C.accent}`:`1px solid ${C.border}`,
            background:on?"#0f2044":C.card,color:on?C.accent:C.muted,
            fontSize:12,fontWeight:on?700:500,
          }},h("div",null,t),h("div",{style:{fontSize:15,fontWeight:800,color:on?C.accent:C.text}},n));
        })
      )
    ),

    // 銘柄リスト
    h("div",{style:{padding:"10px 12px 80px"}},
      filtered.length===0&&h("div",{style:{textAlign:"center",padding:"60px 0",color:C.muted,fontSize:14}},"該当銘柄なし"),
      filtered.map((item,i)=>{
        const open = expanded===item.code;
        return h("div",{key:item.code||i,style:{marginBottom:8}},

          // カード
          h("div",{onClick:()=>toggle(item),style:{
            background:C.card,
            borderRadius:open?"10px 10px 0 0":10,
            border:`1px solid ${open?C.accent+"55":C.border}`,
            borderBottom:open?"none":undefined,
            padding:"12px 14px",cursor:"pointer",
          }},
            h("div",{style:{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:8}},
              h("div",{style:{flex:1,minWidth:0}},
                h("div",{style:{display:"flex",alignItems:"center",gap:6,marginBottom:3}},
                  h("span",{style:{fontSize:11,color:C.muted,fontWeight:600}},`#${i+1}`),
                  h(Chip,{label:item.signal})
                ),
                h("div",{style:{fontSize:15,fontWeight:700,color:"#fff",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}},item.name),
                h("div",{style:{fontSize:15,color:C.muted,fontWeight:600,fontVariantNumeric:"tabular-nums"}},item.code)
              ),
              h("div",{style:{textAlign:"right",flexShrink:0,marginLeft:10}},
                h("div",{style:{fontSize:20,fontWeight:800,lineHeight:1,fontVariantNumeric:"tabular-nums"}},item.score),
                h("div",{style:{fontSize:10,color:C.muted,marginTop:2}},"スコア")
              )
            ),
            h("div",{style:{marginBottom:10}},h(HeatBar,{score:item.score})),
            h("div",{style:{display:"flex",borderTop:`1px solid ${C.dim}`,paddingTop:8,gap:4}},
              h(Stat,{label:"前日比",value:isNaN(item.change)?"-":`${item.change>0?"+":""}${item.change}%`,color:item.change>0?C.green:item.change<0?C.red:C.text}),
              h(Stat,{label:"RSI",value:isNaN(item.rsi)?"-":item.rsi,color:item.rsi>70?C.red:item.rsi<30?C.green:C.text}),
              h(Stat,{label:"MA25乖離",value:isNaN(item.ma25dev)?"-":`${item.ma25dev>0?"+":""}${item.ma25dev.toFixed(1)}%`,color:item.ma25dev>0?C.green:C.red}),
              h(Stat,{label:"株価",value:isNaN(item.price)?"-":`¥${item.price.toLocaleString()}`})
            )
          ),

          // 展開パネル
          open&&h("div",{style:{background:"#090f1e",borderRadius:"0 0 10px 10px",border:`1px solid ${C.accent}33`,borderTop:"none",padding:"12px 14px"}},
            h("div",{style:{fontSize:13,lineHeight:1.8,color:"#cbd5e1",whiteSpace:"pre-wrap",marginBottom:12}},comments[item.code]),

            // ボタン2つ
            h("div",{style:{display:"flex",gap:8}},
              h("button",{onClick:e=>copyPrompt(item,e),style:{
                flex:1,padding:"11px",borderRadius:9,
                background:copied===item.code+"_full"?"#052e16":"#0f2044",
                color:copied===item.code+"_full"?C.green:C.accent,
                border:`1px solid ${copied===item.code+"_full"?C.green+"44":C.accent+"44"}`,
                fontSize:12,fontWeight:700,transition:"all .2s",
              }},copied===item.code+"_full"?"✓ コピー済":"📋 プロンプト全体"),
              h("button",{onClick:e=>copyMemo(item,e),style:{
                flex:1,padding:"11px",borderRadius:9,
                background:copied===item.code+"_memo"?"#052e16":"#1a2a1a",
                color:copied===item.code+"_memo"?C.green:"#4ade80",
                border:`1px solid ${copied===item.code+"_memo"?C.green+"44":"#4ade8044"}`,
                fontSize:12,fontWeight:700,transition:"all .2s",
              }},copied===item.code+"_memo"?"✓ コピー済":"📌 メモだけコピー")
            )
          )
        );
      })
    )
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(React.createElement(App));
</script>
</body>
</html>
